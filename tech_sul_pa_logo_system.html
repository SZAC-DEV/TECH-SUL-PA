
<style>
*{box-sizing:border-box;margin:0;padding:0}
.wrap{padding:1rem 0}
.sec{margin-bottom:2rem}
.lbl{font-size:11px;color:var(--color-text-tertiary);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;font-weight:500}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.card{border-radius:var(--border-radius-lg);padding:32px 16px;display:flex;align-items:center;justify-content:center;border:0.5px solid var(--color-border-tertiary)}
.cl{background:var(--color-background-primary)}
.cd{background:#0e0e0e;border-color:#1e1e1e}
.cg{background:#f7f7f5}
.icon-strip{display:flex;align-items:center;gap:28px;padding:20px 24px;border-radius:var(--border-radius-lg);border:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary)}
.icon-strip-d{background:#0e0e0e;border-color:#1e1e1e}
.chips{display:flex;gap:20px;flex-wrap:wrap;margin-top:8px}
.chip{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--color-text-secondary)}
.sw{width:16px;height:16px;border-radius:3px;flex-shrink:0}
</style>

<div class="wrap">

<div class="sec">
<p class="lbl">Variante azul — principal</p>
<div style="grid-template-columns:1fr 1fr;display:grid;gap:12px">
<div class="card cl">
<svg viewBox="0 0 260 60" width="220" role="img"><title>Tech Sul PA azul claro</title>
<polygon points="30,4 51,16 51,44 30,56 9,44 9,16" fill="#378ADD"/>
<polyline points="18,20 36,30 18,40" fill="none" stroke="white" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
<text x="70" y="26" font-family="'Courier New',monospace" font-weight="700" font-size="22" fill="#0C447C">TECH</text>
<text x="71" y="47" font-family="'Courier New',monospace" font-weight="400" font-size="13" fill="#378ADD" letter-spacing="4">SUL PA</text>
</svg>
</div>
<div class="card cd">
<svg viewBox="0 0 260 60" width="220" role="img"><title>Tech Sul PA azul escuro</title>

<text x="70" y="26" font-family="'Courier New',monospace" font-weight="700" font-size="22" fill="#85B7EB">TECH</text>
<text x="71" y="47" font-family="'Courier New',monospace" font-weight="400" font-size="13" fill="#378ADD" letter-spacing="4">SUL PA</text>
</svg>
</div>
</div>
</div>

<text x="71" y="47" font-family="'Courier New',monospace" font-weight="400" font-size="13" fill="#1D9E75" letter-spacing="4">SUL PA</text>
</svg>

<div class="sec">

<div class="sec">
<p class="lbl">Ícone isolado — 3 tamanhos</p>
<div class="icon-strip">
<svg viewBox="0 0 60 60" width="60" height="60" role="img"><title>Ícone grande azul</title>
<polygon points="30,4 51,16 51,44 30,56 9,44 9,16" fill="#378ADD"/>
<polyline points="18,20 36,30 18,40" fill="none" stroke="white" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
<svg viewBox="0 0 60 60" width="40" height="40" role="img"><title>Ícone médio verde</title>
<polygon points="30,4 51,16 51,44 30,56 9,44 9,16" fill="#1D9E75"/>

<polygon points="30,4 51,16 51,44 30,56 9,44 9,16" fill="#E24B4A"/>
<polyline points="18,20 36,30 18,40" fill="none" stroke="white" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>

<span style="font-size:12px;color:var(--color-text-tertiary);margin-left:8px">60px · 40px · 24px</span>

<div class="chips">
<div class="chip"><div class="sw" style="background:#378ADD"></div> Azul #378ADD</div>
<div class="chip"><div class="sw" style="background:#0C447C"></div> Azul escuro #0C447C</div>

<div class="chip"><div class="sw" style="background:#E24B4A"></div> Vermelho #E24B4A</div>
</div>

<div style="margin-top:1.5rem">
<button onclick="sendPrompt('Gera o arquivo SVG para download da logo TECH SUL PA na variante azul')" style="font-size:13px;padding:8px 16px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-primary);cursor:pointer">Baixar SVG azul ↗</button>
<button onclick="sendPrompt('Gera o arquivo SVG para download da logo TECH SUL PA na variante verde')" style="font-size:13px;padding:8px 16px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-primary);cursor:pointer;margin-left:8px">Baixar SVG verde ↗</button>
